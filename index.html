<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Financeiro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

h1{
text-align:center;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
margin-top:10px;
padding:10px;
width:100%;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
font-size:16px;
}

.entrada{
color:#22c55e;
}

.gasto{
color:#ef4444;
}

.total{
font-size:28px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Controle Financeiro</h1>

<div class="container">

<div class="card">

<h3>Saldo atual</h3>
<div class="total" id="saldo">0</div>

<h3>Total Entradas</h3>
<div id="entradas">0</div>

<h3>Total Gastos</h3>
<div id="gastos">0</div>

</div>

<div class="card">

<h3>Nova movimentação</h3>

<select id="tipo">
<option value="entrada">Entrada</option>
<option value="gasto">Gasto</option>
</select>

<select id="categoria">
<option>Salário</option>
<option>Comida</option>
<option>Gasolina</option>
<option>Compras</option>
<option>Contas</option>
<option>Outros</option>
</select>

<input id="nome" placeholder="Descrição">

<input id="valor" placeholder="Valor">

<button onclick="add()">Adicionar</button>

</div>

<div class="card">

<h3>Histórico</h3>

<div id="lista"></div>

</div>

<div class="card">

<h3>Gráfico financeiro</h3>

<canvas id="grafico"></canvas>

</div>

<div class="card">

<h3>Previsão do mês</h3>

<div id="previsao"></div>

</div>

</div>

<script>

let dados=JSON.parse(localStorage.getItem("dados"))||[]

function salvar(){
localStorage.setItem("dados",JSON.stringify(dados))
}

function add(){

let tipo=document.getElementById("tipo").value
let categoria=document.getElementById("categoria").value
let nome=document.getElementById("nome").value
let valor=parseFloat(document.getElementById("valor").value)

if(!nome || !valor)return

dados.push({tipo,categoria,nome,valor})

salvar()

render()

}

function render(){

let lista=document.getElementById("lista")

lista.innerHTML=""

let entradas=0
let gastos=0

dados.forEach(d=>{

if(d.tipo==="entrada"){

entradas+=d.valor

lista.innerHTML+=`<div class="entrada">+ ${d.nome} (${d.categoria}) R$ ${d.valor}</div>`

}else{

gastos+=d.valor

lista.innerHTML+=`<div class="gasto">- ${d.nome} (${d.categoria}) R$ ${d.valor}</div>`

}

})

let saldo=entradas-gastos

document.getElementById("saldo").innerText="R$ "+saldo
document.getElementById("entradas").innerText="R$ "+entradas
document.getElementById("gastos").innerText="R$ "+gastos

document.getElementById("previsao").innerText="Saldo atual: R$ "+saldo

grafico(entradas,gastos)

}

function grafico(entradas,gastos){

new Chart(document.getElementById("grafico"),{

type:"doughnut",

data:{

labels:["Entradas","Gastos"],

datasets:[{

data:[entradas,gastos]

}]

}

})

}

render()

</script>

</body>
</html>
