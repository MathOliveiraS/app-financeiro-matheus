<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Controle Financeiro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

h1{
text-align:center;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
margin-top:10px;
padding:10px;
width:100%;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
font-size:16px;
}

.entrada{
color:#22c55e;
}

.gasto{
color:#ef4444;
}

.total{
font-size:26px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Controle Financeiro</h1>

<div class="container">

<div class="card">

<h3>Saldo</h3>
<div class="total" id="saldo">R$ 0</div>

</div>

<div class="card">

<h3>Adicionar movimentação</h3>

<label>Tipo</label>
<select id="tipo">
<option value="entrada">Entrada</option>
<option value="gasto">Gasto</option>
</select>

<label>Categoria</label>
<select id="categoria">
<option>Salário</option>
<option>Comida</option>
<option>Gasolina</option>
<option>Compras</option>
<option>Contas</option>
<option>Outros</option>
</select>

<input id="descricao" placeholder="Descrição">

<input id="valor" type="number" placeholder="Valor">

<button onclick="adicionar()">Adicionar</button>

</div>

<div class="card">

<h3>Histórico</h3>
<div id="lista"></div>

</div>

<div class="card">

<h3>Gráfico</h3>
<canvas id="grafico"></canvas>

</div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("financeiro")) || []

function salvar(){

localStorage.setItem("financeiro", JSON.stringify(dados))

}

function adicionar(){

let tipo = document.getElementById("tipo").value
let categoria = document.getElementById("categoria").value
let descricao = document.getElementById("descricao").value
let valor = parseFloat(document.getElementById("valor").value)

if(!descricao || !valor) return

dados.push({
tipo,
categoria,
descricao,
valor
})

salvar()
render()

}

function render(){

let lista = document.getElementById("lista")
lista.innerHTML = ""

let entradas = 0
let gastos = 0

dados.forEach(item => {

if(item.tipo === "entrada"){
entradas += item.valor
lista.innerHTML += `<p class="entrada">+ ${item.descricao} (${item.categoria}) R$ ${item.valor}</p>`
}else{
gastos += item.valor
lista.innerHTML += `<p class="gasto">- ${item.descricao} (${item.categoria}) R$ ${item.valor}</p>`
}

})

let saldo = entradas - gastos

document.getElementById("saldo").innerText = "R$ " + saldo

grafico(entradas, gastos)

}

let graficoChart

function grafico(entradas, gastos){

let ctx = document.getElementById("grafico")

if(graficoChart){
graficoChart.destroy()
}

graficoChart = new Chart(ctx,{
type:"doughnut",
data:{
labels:["Entradas","Gastos"],
datasets:[{
data:[entradas,gastos]
}]
}
})

}

render()

</script>

</body>
</html>
